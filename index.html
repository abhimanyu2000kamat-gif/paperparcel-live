<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaperParcel - Fast & Reliable Courier Faridabad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans">
    <nav class="bg-white border-b sticky top-0 z-50 p-4 shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-orange-600 italic">PaperParcel</h1>
            <a href="https://wa.me/91XXXXXXXXXX" class="bg-orange-600 text-white px-6 py-2 rounded-full font-bold hover:bg-orange-700 shadow-md">Book on WhatsApp</a>
        </div>
    </nav>

    <header class="py-16 px-4 bg-gradient-to-r from-orange-500 to-orange-600 text-white text-center">
        <h2 class="text-4xl md:text-6xl font-black mb-4 uppercase tracking-tighter">Fast & Reliable Courier</h2>
        <p class="text-xl opacity-90 mb-8">Fastest Delivery across Faridabad. Documents to Bulk Orders.</p>
    </header>

    <section class="py-16 px-4 max-w-4xl mx-auto text-center">
        <h3 class="text-3xl font-bold mb-10 text-slate-800">Shipping Calculator</h3>
        <div class="bg-white p-8 rounded-2xl shadow-2xl border-t-8 border-orange-600 text-left max-w-md mx-auto">
            <label class="block text-sm font-bold text-gray-700 mb-2 italic">Distance (Enter in km):</label>
            <input type="number" id="distance" class="w-full border-2 border-slate-100 p-4 rounded-xl mb-6 focus:border-orange-500 outline-none text-lg" placeholder="e.g. 5">
            <button onclick="calculate()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold text-lg hover:bg-black transition-all transform active:scale-95 shadow-lg">Check Estimated Fare</button>
            <div id="result" class="mt-6 p-4 bg-orange-50 text-orange-800 rounded-xl hidden text-center font-bold text-2xl border border-orange-200"></div>
        </div>
    </section>

    <footer class="bg-slate-900 text-white py-12 px-4 text-center">
        <p class="text-orange-500 font-bold mb-4 uppercase tracking-widest text-sm">PaperParcel Faridabad</p>
        <p class="opacity-70 text-xs mt-8 italic">© 2026 PaperParcel. Serving Faridabad with Speed.</p>
    </footer>

    <script>
        function calculate() {
            let d = document.getElementById('distance').value;
            if(!d || d <= 0) return alert("Please enter a valid distance");
            let total = 70;
            if(d > 2) total += (d - 2) * 10;
            let final = (total * 1.23).toFixed(0); // 18% GST + 5% Fuel Surcharge, Rounded to 0 decimals
            let res = document.getElementById('result');
            res.innerHTML = "Approx Fare: ₹" + final;
            res.classList.remove('hidden');
        }
    </script>
</body>
</html>
